name: cepy_stack_agenda

services:
  db:
    image: mysql:8
    container_name: cepy_mysql_compose_agenda
    environment:
      MYSQL_ROOT_PASSWORD: castelar2026
      MYSQL_DATABASE: cepydb
    ports:
      - "33060:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: cepy_apache_compose_agenda
    ports:
      - "80:80"
      - "2221:22"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cepy_phpmyadmin_compose_agenda
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: castelar2026
    ports:
      - "8080:80"
    depends_on:
      - db

  python_app:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: cepy_ubuntu_compose_agenda
    ports:
      - "50000:5000"
      - "2222:22"
    volumes:
      - ./python_app:/app
      - ./home:/home
      - ./home_cepy:/home/cepy
    tty: true
    stdin_open: true